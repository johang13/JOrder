name: Build and Test
run-name: Build and Test for ${{ github.event_name }} on ${{ github.ref_name }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build the project
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal --results-directory ./test-results --logger "trx" --collect:"XPlat Code Coverage"

      - name: Generate test summary
        if: always()
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          ns = {'t': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
          lines = [
              "## Test Results\n",
              "\n",
              "| Project | Tests | Passed |\n",
              "| ------- | :---: | :----: |\n",
          ]

          for trx_file in sorted(glob.glob('./test-results/**/*.trx', recursive=True)):
              tree = ET.parse(trx_file)
              root = tree.getroot()
              first_test = root.find('.//t:UnitTest', ns)
              if first_test is not None:
                  storage = first_test.get('storage', '')
                  project = os.path.splitext(os.path.basename(storage))[0]
              else:
                  dir_name = os.path.basename(os.path.dirname(trx_file))
                  project = dir_name.split('_')[0] if '_' in dir_name else dir_name
              counters = root.find('.//t:Counters', ns)
              if counters is not None:
                  total  = int(counters.get('total',  0))
                  failed = int(counters.get('failed', 0))
                  badge  = '✅' if failed == 0 else '❌'
                  lines.append(f'| {project} | {total} | {badge} |\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as f:
              f.writelines(lines)
          EOF

      - name: Generate coverage summary
        if: always()
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          # Collect per-namespace stats across all cobertura files, deduplicating
          namespaces = {}  # name -> (lines_covered, lines_valid, branches_covered, branches_valid)

          for cov_file in sorted(glob.glob('./test-results/**/coverage.cobertura.xml', recursive=True)):
              tree = ET.parse(cov_file)
              root = tree.getroot()
              for pkg in root.findall('.//package'):
                  for cls in pkg.findall('.//class'):
                      ns = cls.get('name', 'Unknown')
                      # Use everything up to the last dot as the namespace
                      ns = ns.rsplit('.', 1)[0] if '.' in ns else ns

                      prev = namespaces.get(ns, (0, 0, 0, 0))
                      lc = bv = bc = 0
                      lv = 0
                      for line in cls.findall('.//line'):
                          lv += 1
                          if int(line.get('hits', 0)) > 0:
                              lc += 1
                          if line.get('branch') == 'True':
                              cc = line.get('condition-coverage', '')
                              # Format: "50% (1/2)"
                              if '(' in cc:
                                  parts = cc.split('(')[1].rstrip(')').split('/')
                                  bc += int(parts[0])
                                  bv += int(parts[1])

                      namespaces[ns] = (
                          prev[0] + lc, prev[1] + lv,
                          prev[2] + bc, prev[3] + bv,
                      )

          lines = [
              "\n## Code Coverage\n",
              "\n",
              "| Namespace | Line Coverage | Branch Coverage |\n",
              "| --------- | -----------: | --------------: |\n",
          ]

          total_lc = total_lv = total_bc = total_bv = 0
          for ns in sorted(namespaces):
              lc, lv, bc, bv = namespaces[ns]
              total_lc += lc; total_lv += lv; total_bc += bc; total_bv += bv
              line_pct = (lc / lv * 100) if lv else 0
              branch_pct = (bc / bv * 100) if bv else 0
              lines.append(f'| {ns} | {line_pct:.1f}% | {branch_pct:.1f}% |\n')

          total_line = (total_lc / total_lv * 100) if total_lv else 0
          total_branch = (total_bc / total_bv * 100) if total_bv else 0
          lines.append(f'| **Total** | **{total_line:.1f}%** | **{total_branch:.1f}%** |\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as f:
              f.writelines(lines)
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-results
          path: ./test-results