name: Build and Test
run-name: Build and Test for ${{ github.event_name }} on ${{ github.ref_name }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build the project
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          rm -rf ./test-results
          dotnet test --no-build --configuration Release --verbosity normal --results-directory ./test-results --logger "trx" --collect:"XPlat Code Coverage"

      - name: Generate test summary
        if: always()
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          ns = {'t': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
          lines = [
              "## Test Results\n",
              "\n",
              "| Project | Tests | Passed |\n",
              "| ------- | :---: | :----: |\n",
          ]

          for trx_file in sorted(glob.glob('./test-results/**/*.trx', recursive=True)):
              tree = ET.parse(trx_file)
              root = tree.getroot()
              first_test = root.find('.//t:UnitTest', ns)
              if first_test is not None:
                  storage = first_test.get('storage', '')
                  project = os.path.splitext(os.path.basename(storage))[0]
              else:
                  dir_name = os.path.basename(os.path.dirname(trx_file))
                  project = dir_name.split('_')[0] if '_' in dir_name else dir_name
              counters = root.find('.//t:Counters', ns)
              if counters is not None:
                  total  = int(counters.get('total',  0))
                  failed = int(counters.get('failed', 0))
                  badge  = '✅' if failed == 0 else '❌'
                  lines.append(f'| {project} | {total} | {badge} |\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as f:
              f.writelines(lines)
          EOF

      - name: Generate coverage summary
        if: always()
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os
          from collections import defaultdict

          # project -> namespace -> (lines_covered, lines_valid, branches_covered, branches_valid)
          projects = defaultdict(lambda: defaultdict(lambda: (0, 0, 0, 0)))

          for cov_file in sorted(glob.glob('./test-results/**/coverage.cobertura.xml', recursive=True)):
              tree = ET.parse(cov_file)
              root = tree.getroot()
              for pkg in root.findall('.//package'):
                  project = pkg.get('name', 'Unknown')
                  for cls in pkg.findall('.//class'):
                      ns = cls.get('name', 'Unknown')
                      ns = ns.rsplit('.', 1)[0] if '.' in ns else ns
                      if not ns.startswith('JOrder.'):
                          continue

                      prev = projects[project][ns]
                      lc = lv = bc = bv = 0
                      for line in cls.findall('.//line'):
                          lv += 1
                          if int(line.get('hits', 0)) > 0:
                              lc += 1
                          if line.get('branch') == 'True':
                              cc = line.get('condition-coverage', '')
                              if '(' in cc:
                                  parts = cc.split('(')[1].rstrip(')').split('/')
                                  bc += int(parts[0])
                                  bv += int(parts[1])

                      projects[project][ns] = (
                          prev[0] + lc, prev[1] + lv,
                          prev[2] + bc, prev[3] + bv,
                      )

          def pct(n, d):
              return f'{n / d * 100:.1f}%' if d else '—'

          lines = ["\n## Code Coverage\n\n"]
          total_lc = total_lv = total_bc = total_bv = 0

          for project in sorted(projects):
              lines.append(f'### {project}\n\n')
              lines.append('| Namespace | Line | Branch |\n')
              lines.append('| --------- | ---: | -----: |\n')
              p_lc = p_lv = p_bc = p_bv = 0
              for ns in sorted(projects[project]):
                  lc, lv, bc, bv = projects[project][ns]
                  p_lc += lc; p_lv += lv; p_bc += bc; p_bv += bv
                  short_ns = ns.replace(f'{project}.', '') if ns.startswith(f'{project}.') else ns
                  lines.append(f'| {short_ns} | {pct(lc, lv)} | {pct(bc, bv)} |\n')
              lines.append(f'| **Subtotal** | **{pct(p_lc, p_lv)}** | **{pct(p_bc, p_bv)}** |\n\n')
              total_lc += p_lc; total_lv += p_lv; total_bc += p_bc; total_bv += p_bv

          lines.append(f'**Overall: {pct(total_lc, total_lv)} line · {pct(total_bc, total_bv)} branch**\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as f:
              f.writelines(lines)
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-results
          path: ./test-results