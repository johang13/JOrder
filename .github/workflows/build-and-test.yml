name: Build and Test
run-name: Build and Test for ${{ github.event_name }} on ${{ github.ref_name }}

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'JOrder.slnx'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'JOrder.slnx'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build the project
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: |
          rm -rf ./test-results
          mapfile -t unit_projects < <(find tests -type f -name '*UnitTests.csproj' | sort)

          if [ ${#unit_projects[@]} -eq 0 ]; then
            echo "No unit test projects found."
            exit 1
          fi

          for project in "${unit_projects[@]}"; do
            echo "Running unit tests: $project"
            dotnet test "$project" \
              --no-build \
              --configuration Release \
              --verbosity normal \
              --results-directory ./test-results/unit \
              --logger "trx" \
              --collect:"XPlat Code Coverage"
          done

      - name: Run integration tests
        run: |
          mapfile -t integration_projects < <(find tests -type f -name '*IntegrationTests.csproj' | sort)

          if [ ${#integration_projects[@]} -eq 0 ]; then
            echo "No integration test projects found."
            exit 1
          fi

          for project in "${integration_projects[@]}"; do
            echo "Running integration tests: $project"
            dotnet test "$project" \
              --no-build \
              --configuration Release \
              --verbosity normal \
              --results-directory ./test-results/integration \
              --logger "trx" \
              --collect:"XPlat Code Coverage"
          done


      - name: Generate test summary
        if: always()
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          ns = {'t': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
          lines = [
              "## Test Results\n",
              "\n",
              "| Project | Tests | Passed |\n",
              "| ------- | :---: | :----: |\n",
          ]

          for trx_file in sorted(glob.glob('./test-results/**/*.trx', recursive=True)):
              tree = ET.parse(trx_file)
              root = tree.getroot()
              first_test = root.find('.//t:UnitTest', ns)
              if first_test is not None:
                  storage = first_test.get('storage', '')
                  project = os.path.splitext(os.path.basename(storage))[0]
              else:
                  dir_name = os.path.basename(os.path.dirname(trx_file))
                  project = dir_name.split('_')[0] if '_' in dir_name else dir_name
              counters = root.find('.//t:Counters', ns)
              if counters is not None:
                  total  = int(counters.get('total',  0))
                  failed = int(counters.get('failed', 0))
                  badge  = '✅' if failed == 0 else '❌'
                  lines.append(f'| {project} | {total} | {badge} |\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as f:
              f.writelines(lines)
          EOF

      - name: Detect coverage files
        id: detect_coverage
        if: always()
        run: |
          mapfile -t coverage_files < <(find ./test-results -type f -name 'coverage.cobertura.xml' | sort)
          if [ ${#coverage_files[@]} -eq 0 ]; then
            echo "HAS_COVERAGE=false" >> "$GITHUB_ENV"
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          else
            echo "HAS_COVERAGE=true" >> "$GITHUB_ENV"
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate merged coverage report
        if: always() && steps.detect_coverage.outputs.has_coverage == 'true'
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ./test-results/**/coverage.cobertura.xml
          targetdir: ./test-results/coverage-report
          reporttypes: MarkdownSummaryGithub;TextSummary
          assemblyfilters: +JOrder.*;-*.UnitTests;-*.IntegrationTests;-JOrder.Testing
          classfilters: +JOrder.*;-Program;-*.Program;-*.Migrations.*

      - name: Append coverage summary
        if: always()
        run: |
          if [ "${HAS_COVERAGE}" != "true" ]; then
            echo "## Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "No coverage files were produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -f ./test-results/coverage-report/SummaryGithub.md ]; then
            cat ./test-results/coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "Coverage report was generated, but markdown summary file was not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-results
          path: ./test-results

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage-report
          path: ./test-results/coverage-report