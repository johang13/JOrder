name: Build and Test
run-name: Build and Test on ${{ github.ref }} for ${{ github.event_name }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build the project
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal --results-directory ./test-results --logger "trx" --collect:"XPlat Code Coverage"

      - name: Generate test summary
        if: always()
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          ns = {'t': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
          lines = [
              "## Test Results\n",
              "\n",
              "| Project | Tests | Passed |\n",
              "| ------- | :---: | :----: |\n",
          ]

          for trx_file in sorted(glob.glob('./test-results/**/*.trx', recursive=True)):
              tree = ET.parse(trx_file)
              root = tree.getroot()
              first_test = root.find('.//t:UnitTest', ns)
              if first_test is not None:
                  storage = first_test.get('storage', '')
                  project = os.path.splitext(os.path.basename(storage))[0]
              else:
                  dir_name = os.path.basename(os.path.dirname(trx_file))
                  project = dir_name.split('_')[0] if '_' in dir_name else dir_name
              counters = root.find('.//t:Counters', ns)
              if counters is not None:
                  total  = int(counters.get('total',  0))
                  failed = int(counters.get('failed', 0))
                  badge  = '✅' if failed == 0 else '❌'
                  lines.append(f'| {project} | {total} | {badge} |\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as f:
              f.writelines(lines)
          EOF

      - name: Generate coverage summary
        if: always()
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          lines = [
              "\n## Code Coverage\n",
              "\n",
              "| Assembly | Line Coverage | Branch Coverage |\n",
              "| -------- | -----------: | --------------: |\n",
          ]

          for cov_file in sorted(glob.glob('./test-results/**/coverage.cobertura.xml', recursive=True)):
              tree = ET.parse(cov_file)
              root = tree.getroot()
              for pkg in root.findall('.//package'):
                  name = pkg.get('name', 'Unknown')
                  line_rate = float(pkg.get('line-rate', 0)) * 100
                  branch_rate = float(pkg.get('branch-rate', 0)) * 100
                  lines.append(f'| {name} | {line_rate:.1f}% | {branch_rate:.1f}% |\n')

              total_line = float(root.get('line-rate', 0)) * 100
              total_branch = float(root.get('branch-rate', 0)) * 100
              lines.append(f'| **Total** | **{total_line:.1f}%** | **{total_branch:.1f}%** |\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as f:
              f.writelines(lines)
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-results
          path: ./test-results